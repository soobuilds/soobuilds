<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600&amp;display=swap');

      .float1 { animation: float1 5s ease-in-out infinite; }
      .float2 { animation: float2 6s ease-in-out infinite; }
      .float3 { animation: float3 4.5s ease-in-out infinite; }
      .float4 { animation: float4 7s ease-in-out infinite; }
      .float5 { animation: float5 5.5s ease-in-out infinite; }
      .float6 { animation: float6 6.5s ease-in-out infinite; }
      .float7 { animation: float7 4s ease-in-out infinite; }
      .float8 { animation: float8 8s ease-in-out infinite; }
      .float9 { animation: float9 5s ease-in-out infinite; }
      .float10 { animation: float10 6s ease-in-out infinite; }

      @keyframes float1 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        50% { transform: translate(4px, -12px) rotate(8deg); }
      }
      @keyframes float2 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        50% { transform: translate(-6px, -10px) rotate(-10deg); }
      }
      @keyframes float3 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        33% { transform: translate(5px, -8px) rotate(5deg); }
        66% { transform: translate(-4px, -14px) rotate(-6deg); }
      }
      @keyframes float4 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        50% { transform: translate(-5px, -10px) rotate(12deg); }
      }
      @keyframes float5 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        50% { transform: translate(6px, -9px) rotate(-8deg); }
      }
      @keyframes float6 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        40% { transform: translate(-4px, -13px) rotate(10deg); }
        80% { transform: translate(5px, -6px) rotate(-5deg); }
      }
      @keyframes float7 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        50% { transform: translate(3px, -11px) rotate(-12deg); }
      }
      @keyframes float8 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        50% { transform: translate(-7px, -8px) rotate(6deg); }
      }
      @keyframes float9 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        50% { transform: translate(5px, -10px) rotate(-7deg); }
      }
      @keyframes float10 {
        0%,100% { transform: translate(0px, 0px) rotate(0deg); }
        33% { transform: translate(-5px, -12px) rotate(9deg); }
        66% { transform: translate(4px, -5px) rotate(-4deg); }
      }

      .shimmer {
        animation: shimmer 3s ease-in-out infinite;
      }
      @keyframes shimmer {
        0%,100% { opacity: 0.7; }
        50% { opacity: 1; }
      }

      .title-text {
        font-family: 'Georgia', serif;
        font-size: 38px;
        fill: #6b3fa0;
        font-style: italic;
      }
      .sub-text {
        font-family: 'Trebuchet MS', sans-serif;
        font-size: 13px;
        fill: #b09dcc;
        letter-spacing: 3px;
      }
    </style>

    <!-- soft radial gradient background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="60%" stop-color="#ede0ff"/>
      <stop offset="100%" stop-color="#ddd0f5"/>
    </radialGradient>

    <!-- soft glow for center -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8d5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="220" rx="16" fill="url(#bgGrad)"/>

  <!-- soft center glow -->
  <ellipse cx="450" cy="110" rx="320" ry="90" fill="url(#glowGrad)"/>

  <!-- wavy bottom line decoration -->
  <path d="M0 190 Q 112 175 225 190 Q 337 205 450 190 Q 562 175 675 190 Q 787 205 900 190 L900 220 L0 220 Z"
        fill="#d4b8f0" opacity="0.25"/>
  <path d="M0 200 Q 112 188 225 200 Q 337 212 450 200 Q 562 188 675 200 Q 787 212 900 200 L900 220 L0 220 Z"
        fill="#c9a8e8" opacity="0.2"/>

  <!-- tiny dot pattern -->
  <circle cx="60" cy="40" r="2" fill="#c9a8e8" opacity="0.4"/>
  <circle cx="120" cy="70" r="1.5" fill="#c9a8e8" opacity="0.3"/>
  <circle cx="780" cy="40" r="2" fill="#c9a8e8" opacity="0.4"/>
  <circle cx="840" cy="75" r="1.5" fill="#c9a8e8" opacity="0.3"/>
  <circle cx="200" cy="190" r="2" fill="#c9a8e8" opacity="0.35"/>
  <circle cx="700" cy="185" r="2" fill="#c9a8e8" opacity="0.35"/>
  <circle cx="450" cy="25" r="1.5" fill="#c9a8e8" opacity="0.3"/>

  <!-- CENTER TEXT -->
  <text x="450" y="105" text-anchor="middle" class="title-text">hi, i'm soonhan ✿</text>
  <text x="450" y="135" text-anchor="middle" class="sub-text">IT GRADUATE · CREATIVE MIND · PERPETUAL LEARNER</text>

  <!-- FLOATING OBJECTS -->

  <!-- 🌸 top left -->
  <text x="55" y="60" font-size="28" class="float1" text-anchor="middle">🌸</text>

  <!-- ✨ top right -->
  <text x="840" y="55" font-size="24" class="float2" text-anchor="middle">✨</text>

  <!-- 💜 left mid -->
  <text x="38" y="130" font-size="22" class="float3" text-anchor="middle">💜</text>

  <!-- 🌿 right mid -->
  <text x="862" y="125" font-size="22" class="float4" text-anchor="middle">🌿</text>

  <!-- 🧶 bottom left -->
  <text x="80" y="185" font-size="20" class="float5" text-anchor="middle">🧶</text>

  <!-- 🪴 bottom right -->
  <text x="820" y="185" font-size="20" class="float6" text-anchor="middle">🪴</text>

  <!-- ⭐ top center-left -->
  <text x="220" y="45" font-size="18" class="float7 shimmer" text-anchor="middle">⭐</text>

  <!-- 🌙 top center-right -->
  <text x="680" y="48" font-size="18" class="float8 shimmer" text-anchor="middle">🌙</text>

  <!-- 📷 lower left area -->
  <text x="155" y="190" font-size="18" class="float9" text-anchor="middle">📷</text>

  <!-- 🎨 lower right area -->
  <text x="745" y="190" font-size="18" class="float10" text-anchor="middle">🎨</text>

  <!-- tiny sparkle dots that pulse -->
  <circle cx="310" cy="55" r="3" fill="#c9a8e8" class="shimmer"/>
  <circle cx="590" cy="55" r="3" fill="#c9a8e8" class="shimmer" style="animation-delay:1s"/>
  <circle cx="340" cy="175" r="2.5" fill="#d4b8f0" class="shimmer" style="animation-delay:0.5s"/>
  <circle cx="560" cy="175" r="2.5" fill="#d4b8f0" class="shimmer" style="animation-delay:1.5s"/>

</svg>
